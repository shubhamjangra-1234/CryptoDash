<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="Images/CryptoDash.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>CryptoDash - Real-time Cryptocurrency Market Data & Portfolio Tracking</title>
    <meta name="title" content="CryptoDash - Real-time Cryptocurrency Market Data & Portfolio Tracking" />
    <meta name="description" content="Track cryptocurrency prices, market data, and manage your portfolio in real-time. Get live updates, charts, and insights for Bitcoin, Ethereum, and thousands of altcoins." />
    <meta name="keywords" content="cryptocurrency, bitcoin, ethereum, crypto prices, portfolio tracker, market data, blockchain, defi, trading" />
    <meta name="author" content="CryptoDash Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cryptodash.app" />
    <meta property="og:title" content="CryptoDash - Real-time Cryptocurrency Market Data" />
    <meta property="og:description" content="Track cryptocurrency prices, market data, and manage your portfolio in real-time." />
    <meta property="og:image" content="https://cryptodash.app/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://cryptodash.app" />
    <meta property="twitter:title" content="CryptoDash - Real-time Cryptocurrency Market Data" />
    <meta property="twitter:description" content="Track cryptocurrency prices, market data, and manage your portfolio in real-time." />
    <meta property="twitter:image" content="https://cryptodash.app/twitter-image.png" />
    
    <!-- Additional Meta -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CryptoDash" />
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://api.coingecko.com" />
    <link rel="dns-prefetch" href="https://api.coingecko.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
